<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Network nodes (decorative) -->
  <g opacity="0.3">
    <circle cx="150" cy="200" r="20" fill="#e6194b"/><circle cx="280" cy="150" r="15" fill="#3cb44b"/>
    <circle cx="400" cy="250" r="25" fill="#4363d8"/><circle cx="320" cy="350" r="12" fill="#f58231"/>
    <circle cx="500" cy="180" r="18" fill="#911eb4"/><circle cx="550" cy="320" r="22" fill="#42d4f4"/>
    <circle cx="180" cy="380" r="14" fill="#f032e6"/><circle cx="650" cy="220" r="16" fill="#bfef45"/>
    <circle cx="700" cy="350" r="20" fill="#469990"/><circle cx="750" cy="150" r="13" fill="#dcbeff"/>
    <circle cx="850" cy="250" r="24" fill="#e6194b"/><circle cx="900" cy="380" r="17" fill="#3cb44b"/>
