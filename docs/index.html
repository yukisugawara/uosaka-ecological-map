<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UOsaka Research Landscape</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; background: #0a0a0a; color: #eee; overflow: hidden; height: 100vh; }

  /* Header */
  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333; padding: 10px 20px; display: flex; align-items: center; gap: 20px; }
  #header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  #header h1 small { font-size: 11px; color: #888; font-weight: 400; margin-left: 8px; }

  /* Search */
  #search-box { position: relative; flex: 0 0 320px; }
  #search-input { width: 100%; padding: 7px 12px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: #eee; font-size: 14px; outline: none; }
  #search-input:focus { border-color: #4363d8; }
  #search-input::placeholder { color: #666; }
  #search-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #444; border-top: none; border-radius: 0 0 6px 6px; max-height: 400px; overflow-y: auto; display: none; z-index: 200; }
  .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
  .search-item:hover { background: #2a2a3a; }
  .search-item .org { color: #888; font-size: 11px; }
  .search-item .name-en { color: #aaa; font-size: 11px; margin-left: 6px; }

  /* Network */
  #network { position: absolute; top: 50px; left: 0; right: 350px; bottom: 0; }

  /* Detail Panel */
  #detail-panel { position: fixed; top: 50px; right: 0; width: 350px; bottom: 0; background: #111; border-left: 1px solid #333; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
  #detail-panel.empty { justify-content: center; align-items: center; }
  #detail-placeholder { color: #555; text-align: center; font-size: 13px; }
  #detail-content { display: none; }
  #detail-content.active { display: block; }

  .detail-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .detail-name-en { font-size: 13px; color: #888; margin-bottom: 10px; }
  .detail-meta { font-size: 12px; color: #aaa; margin-bottom: 4px; }
  .detail-meta b { color: #ccc; }
  .detail-field { font-size: 12px; color: #7ab8f5; margin: 8px 0; line-height: 1.5; }
  .detail-topic { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; margin: 6px 0 12px; }

  .section-title { font-size: 14px; font-weight: 600; color: #ddd; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #333; }
  .paper-item, .grant-item { font-size: 12px; color: #bbb; margin-bottom: 10px; line-height: 1.5; }
  .paper-title { color: #eee; font-weight: 500; }
  .paper-meta { color: #777; font-size: 11px; margin-top: 1px; }
  .grant-cat { color: #f5a623; font-size: 11px; }
  .grant-period { color: #777; font-size: 11px; }
  .stat-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 6px; background: #222; border: 1px solid #444; }

  /* Legend toggle */
  #legend-toggle { cursor: pointer; color: #888; font-size: 12px; text-decoration: underline; margin-left: auto; white-space: nowrap; }
  #legend { position: fixed; top: 50px; left: 0; width: 250px; bottom: 0; background: rgba(10,10,10,0.92); border-right: 1px solid #333; overflow-y: auto; padding: 12px; display: none; z-index: 90; }
  #legend.visible { display: block; }
  #legend h3 { font-size: 13px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; margin: 3px 0; font-size: 11px; color: #ccc; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

  /* Loading */
  #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; }
  #loading h2 { font-size: 18px; margin-bottom: 12px; }
  #loading-bar { width: 300px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  #loading-fill { height: 100%; width: 0%; background: #4363d8; transition: width 0.3s; }
  #loading-text { margin-top: 8px; font-size: 12px; color: #888; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <h2>UOsaka Research Landscape</h2>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <div id="loading-text">データを読み込み中...</div>
</div>

<!-- Header -->
<div id="header">
  <h1>UOsaka Research Landscape<small>大阪大学 研究者マップ</small></h1>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="研究者を検索（名前・所属・分野）..." autocomplete="off">
    <div id="search-results"></div>
  </div>
  <span id="legend-toggle" onclick="toggleLegend()">Topics ▼</span>
</div>

<!-- Legend -->
<div id="legend">
  <h3>Research Topics</h3>
  <div id="legend-items"></div>
</div>

<!-- Network -->
<div id="network"></div>

<!-- Detail Panel -->
<div id="detail-panel" class="empty">
  <div id="detail-placeholder">
    研究者を検索するか<br>ノードをクリックしてください
  </div>
  <div id="detail-content"></div>
</div>

<script>
const COLORS = [
  '#e6194b','#3cb44b','#ffe119','#4363d8','#f58231',
  '#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4',
  '#469990','#dcbeff','#9A6324','#fffac8','#800000',
  '#aaffc3','#808000','#ffd8b1','#000075','#a9a9a9',
  '#e6beff','#1abc9c','#e74c3c','#3498db','#2ecc71',
  '#9b59b6','#f39c12','#1abc9c','#e67e22','#2c3e50',
];

let network, nodesDataset, edgesDataset, researcherData = {}, nodeIndex = [];

async function init() {
  const loadingFill = document.getElementById('loading-fill');
  const loadingText = document.getElementById('loading-text');

  // Load data
  loadingText.textContent = 'ネットワークデータを読み込み中...';
  loadingFill.style.width = '20%';
  const netResp = await fetch('network.json');
  const netData = await netResp.json();

  loadingText.textContent = '研究者データを読み込み中...';
  loadingFill.style.width = '50%';
  const resResp = await fetch('researchers.json');
  researcherData = await resResp.json();

  loadingText.textContent = 'ネットワークを構築中...';
  loadingFill.style.width = '70%';

  // Build search index
  nodeIndex = netData.nodes.map(n => {
    const info = researcherData[n.id] || {};
    return {
      id: n.id,
      name: info.name || n.name || n.id,
      name_en: info.name_en || '',
      org: info.org || '',
      org_lv1: info.org_lv1 || '',
      field: info.field || '',
      job: info.job || '',
    };
  });

  // Create vis datasets
  nodesDataset = new vis.DataSet(netData.nodes.map(n => ({
    id: n.id,
    label: n.label,
    color: { background: n.color, border: n.color, highlight: { background: '#fff', border: n.color } },
    size: n.size,
    font: { color: '#fff', size: 10, strokeWidth: 2, strokeColor: '#000' },
    borderWidth: 1.5,
    group: n.group,
  })));

  edgesDataset = new vis.DataSet(netData.edges.map((e, i) => ({
    id: i,
    from: e.from,
    to: e.to,
    width: e.width,
    color: { color: '#333', highlight: '#888', opacity: 0.4 },
    smooth: { type: 'continuous' },
  })));

  loadingText.textContent = 'レイアウトを計算中...';
  loadingFill.style.width = '85%';

  // Create network
  const container = document.getElementById('network');
  network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, {
    physics: {
      forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.008, springLength: 120, springConstant: 0.02, damping: 0.4 },
      solver: 'forceAtlas2Based',
      maxVelocity: 40,
      timestep: 0.35,
      stabilization: { enabled: true, iterations: 250, updateInterval: 25 },
    },
    nodes: { shape: 'dot', borderWidth: 1.5 },
    edges: { selectionWidth: 2 },
    interaction: { hover: true, tooltipDelay: 300, navigationButtons: true, keyboard: true },
  });

  network.on('stabilizationProgress', (params) => {
    const pct = 85 + (params.iterations / params.total) * 15;
    loadingFill.style.width = pct + '%';
    loadingText.textContent = `レイアウト計算中... ${Math.round(params.iterations/params.total*100)}%`;
  });

  network.on('stabilizationIterationsDone', () => {
    loadingFill.style.width = '100%';
    loadingText.textContent = '完了';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);
  });

  // Click handler
  network.on('click', (params) => {
    if (params.nodes.length > 0) {
      showDetail(params.nodes[0]);
    }
  });

  // Build legend
  buildLegend(netData.nodes);

  // Search setup
  setupSearch();
}

function showDetail(nodeId) {
  const info = researcherData[nodeId];
  if (!info) return;

  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const placeholder = document.getElementById('detail-placeholder');

  panel.classList.remove('empty');
  placeholder.style.display = 'none';
  content.classList.add('active');

  const topicColor = info.topic ? COLORS[parseInt(nodesDataset.get(nodeId)?.group) % COLORS.length] || '#888' : '#888';

  let html = `
    <div class="detail-name">${esc(info.name)}</div>
    <div class="detail-name-en">${esc(info.name_en)}</div>
    <div class="detail-meta"><b>所属:</b> ${esc(info.org_lv1)} ${esc(info.org)}</div>
    <div class="detail-meta"><b>職位:</b> ${esc(info.job)}</div>
    <div class="detail-field">${esc(info.field)}</div>
    <div class="detail-topic" style="background:${topicColor}33;border:1px solid ${topicColor};color:${topicColor}">${esc(info.topic || 'N/A')}</div>
    <div>
      <span class="stat-badge">論文 ${info.n_papers}</span>
      <span class="stat-badge">助成金 ${info.n_grants}</span>
    </div>
  `;

  if (info.papers && info.papers.length > 0) {
    html += `<div class="section-title">主な論文 (${info.n_papers}件中)</div>`;
    for (const p of info.papers) {
      html += `<div class="paper-item">
        <div class="paper-title">${esc(p.title)}</div>
        <div class="paper-meta">${esc(p.journal || '')} ${esc(p.date || '')}</div>
      </div>`;
    }
  }

  if (info.grants && info.grants.length > 0) {
    html += `<div class="section-title">主な助成金 (${info.n_grants}件中)</div>`;
    for (const g of info.grants) {
      html += `<div class="grant-item">
        <div class="paper-title">${esc(g.title)}</div>
        <div class="grant-cat">${esc(g.category || '')}</div>
        <div class="grant-period">${esc(g.from || '')} ~ ${esc(g.to || '')}</div>
      </div>`;
    }
  }

  content.innerHTML = html;

  // Highlight node
  network.selectNodes([nodeId]);
  network.focus(nodeId, { scale: 1.5, animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
}

function setupSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 1) { results.style.display = 'none'; return; }

    const matches = nodeIndex.filter(n =>
      n.name.toLowerCase().includes(q) ||
      n.name_en.toLowerCase().includes(q) ||
      n.org.toLowerCase().includes(q) ||
      n.org_lv1.toLowerCase().includes(q) ||
      n.field.toLowerCase().includes(q)
    ).slice(0, 20);

    if (matches.length === 0) {
      results.innerHTML = '<div class="search-item" style="color:#666">該当なし</div>';
    } else {
      results.innerHTML = matches.map(m => `
        <div class="search-item" data-id="${m.id}">
          <span>${esc(m.name)}</span><span class="name-en">${esc(m.name_en)}</span>
          <div class="org">${esc(m.org_lv1)} ${esc(m.org)} / ${esc(m.job)}</div>
        </div>
      `).join('');
    }
    results.style.display = 'block';
  });

  results.addEventListener('click', (e) => {
    const item = e.target.closest('.search-item');
    if (!item || !item.dataset.id) return;
    showDetail(item.dataset.id);
    results.style.display = 'none';
    input.value = '';
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-box')) results.style.display = 'none';
  });

  // Enter key
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const first = results.querySelector('.search-item[data-id]');
      if (first) { showDetail(first.dataset.id); results.style.display = 'none'; input.value = ''; }
    }
  });
}

function buildLegend(nodes) {
  // Count topics
  const topicCounts = {};
  for (const n of nodes) {
    const g = n.group;
    if (g === undefined || g < 0) continue;
    topicCounts[g] = (topicCounts[g] || 0) + 1;
  }

  const container = document.getElementById('legend-items');
  const sorted = Object.entries(topicCounts).sort((a, b) => b[1] - a[1]);
  for (const [tid, count] of sorted) {
    const color = COLORS[parseInt(tid) % COLORS.length];
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="legend-dot" style="background:${color}"></span>Topic ${tid} (${count})`;
    container.appendChild(div);
  }
}

function toggleLegend() {
  document.getElementById('legend').classList.toggle('visible');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
